name: CI Engine

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "owner/repo to build"
        required: true
        type: string
      ref:
        description: "Branch or SHA to checkout"
        required: true
        type: string
      check_run_id:
        description: "GitHub check run ID to update on completion"
        type: string
      pr_number:
        description: "PR number (if applicable)"
        type: string
      devcenter_repository_id:
        description: "Dev Center repository ID for result recording"
        type: string
      publish:
        description: "Whether to publish (true on main branch merges)"
        type: string
        default: "false"

  workflow_call:
    inputs:
      target_repo:
        required: true
        type: string
      ref:
        required: true
        type: string
      check_run_id:
        type: string
      pr_number:
        type: string
      devcenter_repository_id:
        type: string
      publish:
        type: string
        default: "false"

concurrency:
  group: ci-${{ inputs.target_repo }}-${{ inputs.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  CODEARTIFACT_DOMAIN: dev-center
  CODEARTIFACT_DOMAIN_OWNER: "572953113830"
  ECR_REGISTRY: 572953113830.dkr.ecr.us-east-1.amazonaws.com

jobs:
  ci:
    runs-on: riven-runner
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      RIVEN_REGISTRY_URL: http://proto-registry.dev-center.svc.cluster.local:8080
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.ref }}

      - name: Exchange GitHub OIDC for platform token
        shell: bash
        run: |
          if [ -n "$RIVEN_TOKEN" ]; then
            echo "RIVEN_TOKEN already set (from secret), skipping OIDC exchange"
            exit 0
          fi
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ] || [ -z "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then
            echo "::warning::OIDC not available — proto registry auth skipped"
            exit 0
          fi
          OIDC_RAW=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=identity-service" 2>&1) || true
          OIDC_TOKEN=$(echo "$OIDC_RAW" | jq -r '.value // empty' 2>/dev/null) || true
          if [ -z "$OIDC_TOKEN" ]; then
            echo "::warning::Could not get GitHub OIDC token"
            exit 0
          fi
          RESPONSE=$(curl -sS --connect-timeout 5 -X POST \
            "https://api.riven-ai.dev/com.riven.platform.identity.v1.IdentityService/ExchangeGitHubOidcToken" \
            -H "Content-Type: application/json" \
            -d "{\"providerToken\":\"$OIDC_TOKEN\",\"repository\":\"$GITHUB_REPOSITORY\",\"workflowRef\":\"$GITHUB_REF\"}" 2>&1) || true
          PLATFORM_TOKEN=$(echo "$RESPONSE" | jq -r '.accessToken // empty' 2>/dev/null) || true
          if [ -n "$PLATFORM_TOKEN" ]; then
            echo "RIVEN_TOKEN=$PLATFORM_TOKEN" >> $GITHUB_ENV
            echo "::add-mask::$PLATFORM_TOKEN"
            echo "Platform token acquired via OIDC exchange"
          else
            echo "::warning::Platform token exchange failed"
            echo "  Response: $(echo "$RESPONSE" | head -c 300)"
          fi

      - uses: riven-private/github-actions/actions/setup-workspace@main
        id: setup
        with:
          codeartifact-domain: ${{ env.CODEARTIFACT_DOMAIN }}
          codeartifact-domain-owner: ${{ env.CODEARTIFACT_DOMAIN_OWNER }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: riven-private/github-actions/actions/build-and-test@main

      - uses: riven-private/github-actions/actions/publish-services@main
        if: inputs.publish == 'true' && steps.setup.outputs.has-services == 'true'
        with:
          ecr-registry: ${{ env.ECR_REGISTRY }}

      - uses: riven-private/github-actions/actions/publish-libraries@main
        if: inputs.publish == 'true' && steps.setup.outputs.has-libraries == 'true'

      - uses: riven-private/github-actions/actions/report-results@main
        if: always()
        with:
          devcenter-url: http://dev-center-service.dev-center.svc.cluster.local:8080
          repository-id: ${{ inputs.devcenter_repository_id }}
          check-run-id: ${{ inputs.check_run_id }}
          status: ${{ job.status }}

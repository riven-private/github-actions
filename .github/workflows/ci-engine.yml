name: CI Engine

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "owner/repo to build"
        required: true
        type: string
      ref:
        description: "Branch or SHA to checkout"
        required: true
        type: string
      check_run_id:
        description: "GitHub check run ID to update on completion"
        type: string
      pr_number:
        description: "PR number (if applicable)"
        type: string
      devcenter_repository_id:
        description: "Dev Center repository ID for result recording"
        type: string
      publish:
        description: "Whether to publish (true on main branch merges)"
        type: string
        default: "false"

  workflow_call:
    inputs:
      target_repo:
        required: true
        type: string
      ref:
        required: true
        type: string
      check_run_id:
        type: string
      pr_number:
        type: string
      devcenter_repository_id:
        type: string
      publish:
        type: string
        default: "false"

concurrency:
  # For PR dispatches we want newer pushes on the same PR to cancel older runs,
  # so we key by pr_number. For push (publish) dispatches pr_number is empty,
  # so we fall back to the target ref/SHA — distinct commits run independently.
  # github.ref here is always refs/heads/main of this repo (workflow_dispatch ref),
  # which is why the prior key canceled unrelated target_repo runs. See dev-center#112 diagnosis.
  group: ci-${{ inputs.target_repo }}-${{ inputs.pr_number || inputs.ref }}
  cancel-in-progress: true

# Centralized config — keep in sync with actions/shared/defaults.env
env:
  AWS_REGION: us-east-1
  CODEARTIFACT_DOMAIN: dev-center
  CODEARTIFACT_DOMAIN_OWNER: "572953113830"
  ECR_REGISTRY: 572953113830.dkr.ecr.us-east-1.amazonaws.com

jobs:
  ci:
    runs-on: riven-runner
    timeout-minutes: 30
    env:
      RIVEN_TOKEN: ${{ secrets.RIVEN_TOKEN }}
      RIVEN_REGISTRY_URL: http://proto-registry.dev-center.svc.cluster.local:8080
    steps:
      # Mint a short-lived GitHub App token scoped to the org — needed to
      # clone private target repos in cross-repo workflow_dispatch flows
      # (gohan-bot-app dispatches ci-engine.yml in this repo against a
      # different target). For reusable-workflow callers (a repo's own
      # ci.yml calls ci-engine.yml), github.repository already matches
      # inputs.target_repo and the default GITHUB_TOKEN works — so skip
      # this step to avoid a hard failure on PRs from repos whose secrets
      # don't include GOHAN_APP_ID/GOHAN_PRIVATE_KEY.
      - name: Generate GitHub App token for target repo access
        id: target-token
        if: inputs.target_repo != github.repository
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GOHAN_APP_ID }}
          private-key: ${{ secrets.GOHAN_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # Point the check's details_url at this workflow_run BEFORE any real
      # work starts, so users clicking the pending check on GitHub land on
      # a page with all steps + streaming logs instead of the target repo's
      # root (which is what gohan-bot-app sets at check creation). Running
      # this first also means detailsUrl is correct even if the job later
      # fails before the final "Update check run" step. Requires the cross-
      # repo app token, so it's skipped for reusable-workflow callers.
      - name: Update check details_url to this workflow run
        if: inputs.check_run_id != '' && steps.target-token.outputs.token != ''
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TARGET="${{ inputs.target_repo }}"
          if [ -z "$TARGET" ] || ! echo "$TARGET" | grep -q '/'; then
            echo "No valid target_repo — skipping details_url update"
            exit 0
          fi
          REPO_OWNER="${TARGET%%/*}"
          REPO_NAME="${TARGET##*/}"
          # Use curl instead of `gh` — self-hosted riven-runner doesn't have
          # the gh CLI installed; curl is always available.
          HTTP_CODE=$(curl -sS -o /tmp/details.resp -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/check-runs/${{ inputs.check_run_id }}" \
            -d "$(printf '{"details_url":"%s"}' "${RUN_URL}")")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to set check details_url (HTTP ${HTTP_CODE}):"
            cat /tmp/details.resp
            exit 1
          fi
          echo "Check details_url set to ${RUN_URL}"

      - uses: actions/checkout@v5
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.ref }}
          # Cross-repo dispatches need the app token to clone a different
          # private repo; reusable-workflow callers leave this empty so
          # checkout falls back to the default GITHUB_TOKEN (which is
          # already scoped to the caller repo).
          token: ${{ steps.target-token.outputs.token || github.token }}
          fetch-depth: 2  # Need HEAD~1 for changed-file detection in publish

      - uses: riven-private/github-actions/actions/setup-workspace@main
        id: setup
        with:
          codeartifact-domain: ${{ env.CODEARTIFACT_DOMAIN }}
          codeartifact-domain-owner: ${{ env.CODEARTIFACT_DOMAIN_OWNER }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Build phase (codegen + tsc) — must complete before lint/test/publish ──
      - uses: riven-private/github-actions/actions/build-and-test@main
        id: build
        with:
          build-only: "true"

      # ── Parallel phase: lint+test AND Docker publish run concurrently ──
      # Docker builds only need dist/ from build step, not test results.
      # This overlaps the ~5 min lint+test with ~3 min Docker publish.
      - name: Lint, Test, and Publish (parallel)
        id: verify-and-publish
        shell: bash
        env:
          NODE_OPTIONS: "--max-old-space-size=3072"
          PUBLISH: ${{ inputs.publish }}
          HAS_SERVICES: ${{ steps.setup.outputs.has-services }}
          HAS_LIBRARIES: ${{ steps.setup.outputs.has-libraries }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
        run: |
          set +e
          PUBLISH_PID=""
          PUBLISH_EXIT=0
          LINT_EXIT=0
          TEST_EXIT=0

          # ── Start Docker publish in background (main branch only) ──
          if [ "$PUBLISH" = "true" ] && [ "$HAS_SERVICES" = "true" ]; then
            echo "::group::Starting Docker publish in background"
            (
              set +e
              # Inline the publish-services logic
              SERVICES="[]"
              if [ -f "detection.json" ]; then
                SERVICES=$(jq -c '.services' detection.json)
              fi
              SHA=$(git rev-parse --short HEAD)
              TOTAL=$(echo "$SERVICES" | jq 'length')

              if [ "$TOTAL" -eq 0 ] || [ "$SERVICES" = "[]" ]; then
                echo "[publish] No services to publish"
                exit 0
              fi

              # ECR login
              aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin "$ECR_REGISTRY" 2>/dev/null

              # Detect changed files for skip-unchanged
              CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
              FORCE_ALL=false
              if [ -z "$CHANGED_FILES" ]; then
                FORCE_ALL=true
              elif echo "$CHANGED_FILES" | grep -qE '^(package\.json|yarn\.lock|\.yarnrc\.yml|Dockerfile$|common/)'; then
                FORCE_ALL=true
              fi

              # Filter to changed services
              FILTERED="[]"
              while read -r svc; do
                [ -z "$svc" ] && continue
                DIR=$(echo "$svc" | jq -r '.dir')
                NAME=$(echo "$svc" | jq -r '.name')
                if [ "$FORCE_ALL" = "true" ] || echo "$CHANGED_FILES" | grep -q "^${DIR}/"; then
                  FILTERED=$(echo "$FILTERED" | jq --argjson s "$svc" '. + [$s]')
                else
                  echo "[publish] Skipping $NAME (unchanged)"
                fi
              done < <(echo "$SERVICES" | jq -c '.[]')

              FCOUNT=$(echo "$FILTERED" | jq 'length')
              echo "[publish] Building $FCOUNT of $TOTAL services"

              if [ "$FCOUNT" -eq 0 ]; then
                echo "[publish] Nothing changed"
                exit 0
              fi

              # Cache workspace list for staging
              WS_FILE=$(mktemp)
              yarn workspaces list --json 2>/dev/null > "$WS_FILE" || true
              RESULT_DIR=$(mktemp -d)

              # Build each service in parallel with staged context
              IDX=0
              PIDS=()
              while read -r svc; do
                [ -z "$svc" ] && continue
                IDX=$((IDX + 1))
                (
                  NAME=$(echo "$svc" | jq -r '.name')
                  DIR=$(echo "$svc" | jq -r '.dir')
                  ECR=$(echo "$svc" | jq -r '.ecr')
                  VERSION=$(echo "$svc" | jq -r '.version')
                  DOCKERFILE=$(echo "$svc" | jq -r '.dockerfile')
                  TAG="${VERSION}-${SHA}"
                  IMAGE="${ECR_REGISTRY}/${ECR}:${TAG}"
                  SAFE="${NAME//\//_}"

                  echo "[publish $IDX/$FCOUNT] $NAME → $IMAGE"

                  # Stage minimal context
                  STAGE=$(mktemp -d)
                  cp package.json yarn.lock .yarnrc.yml "$STAGE/"
                  [ -d ".yarn" ] && cp -r .yarn "$STAGE/.yarn"
                  while IFS= read -r ws; do
                    [ -z "$ws" ] && continue
                    WL=$(echo "$ws" | jq -r '.location')
                    [ "$WL" = "." ] && continue
                    mkdir -p "$STAGE/$WL"
                    [ -f "$WL/package.json" ] && cp "$WL/package.json" "$STAGE/$WL/package.json"
                  done < "$WS_FILE"
                  mkdir -p "$STAGE/$DIR"
                  cp "$DIR/package.json" "$STAGE/$DIR/"
                  [ -d "$DIR/dist" ] && cp -r "$DIR/dist" "$STAGE/$DIR/dist"
                  [ -d "$DIR/proto" ] && cp -r "$DIR/proto" "$STAGE/$DIR/proto"
                  [ -d "$DIR/prisma" ] && cp -r "$DIR/prisma" "$STAGE/$DIR/prisma"
                  if [ -d "$DIR/src/__generated__" ]; then
                    mkdir -p "$STAGE/$DIR/src/__generated__"
                    cp -r "$DIR/src/__generated__"/* "$STAGE/$DIR/src/__generated__/" 2>/dev/null || true
                  fi
                  mkdir -p "$STAGE/$(dirname "$DOCKERFILE")"
                  cp "$DOCKERFILE" "$STAGE/$DOCKERFILE"

                  # Ensure ECR repo
                  aws ecr describe-repositories --repository-names "$ECR" >/dev/null 2>&1 \
                    || aws ecr create-repository --repository-name "$ECR" --image-scanning-configuration scanOnPush=true >/dev/null 2>&1 \
                    || true

                  # Build and push (secret mounted, never baked into layers)
                  if DOCKER_BUILDKIT=1 docker build -t "$IMAGE" -t "${ECR_REGISTRY}/${ECR}:latest" \
                    -f "$STAGE/$DOCKERFILE" \
                    --build-arg SERVICE_NAME="$NAME" \
                    --build-arg CI_PREBUILT=true \
                    --secret id=codeartifact_token,env=CODEARTIFACT_AUTH_TOKEN \
                    "$STAGE" \
                    && docker push "$IMAGE" \
                    && docker push "${ECR_REGISTRY}/${ECR}:latest"; then
                    echo "OK" > "$RESULT_DIR/${SAFE}.status"
                    echo "[publish $IDX/$FCOUNT] Published $NAME:$TAG"
                  else
                    echo "FAIL" > "$RESULT_DIR/${SAFE}.status"
                    echo "[publish $IDX/$FCOUNT] FAILED $NAME"
                  fi
                  rm -rf "$STAGE"
                ) &
                PIDS+=($!)
              done < <(echo "$FILTERED" | jq -c '.[]')

              # Wait for all parallel Docker builds
              for pid in "${PIDS[@]}"; do
                wait "$pid" 2>/dev/null || true
              done

              # Check results
              FAILED=0
              for sf in "$RESULT_DIR"/*.status; do
                [ -f "$sf" ] || continue
                [ "$(cat "$sf")" = "FAIL" ] && FAILED=$((FAILED + 1))
              done
              rm -rf "$RESULT_DIR" "$WS_FILE"
              docker image prune -f 2>/dev/null || true

              if [ "$FAILED" -gt 0 ]; then
                echo "[publish] $FAILED service(s) failed"
                exit 1
              fi
              echo "[publish] All services published"
            ) > /tmp/publish.log 2>&1 &
            PUBLISH_PID=$!
            echo "Docker publish started (PID $PUBLISH_PID)"
            echo "::endgroup::"
          fi

          # ── Lint + Test in parallel (foreground) ──
          TYPE="yarn"
          if [ -f "detection.json" ]; then
            TYPE=$(jq -r '.workspace_type' detection.json)
          fi

          HAS_LINT=$(node -e "const p=require('./package.json'); process.exit(p.scripts?.lint ? 0 : 1)" 2>/dev/null && echo "true" || echo "false")
          HAS_TEST=$(node -e "const p=require('./package.json'); process.exit(p.scripts?.test ? 0 : 1)" 2>/dev/null && echo "true" || echo "false")

          # Start lint in background
          if [ "$HAS_LINT" = "true" ]; then
            (
              case "$TYPE" in
                yarn) yarn lint ;;
                pnpm) pnpm lint ;;
                npm)  npm run lint ;;
                uv)   uv run ruff check .; uv run ruff format --check . ;;
                go)   golangci-lint run ./... ;;
              esac
            ) > /tmp/lint.log 2>&1 &
            LINT_PID=$!
          fi

          # Run test in foreground
          if [ "$HAS_TEST" = "true" ]; then
            case "$TYPE" in
              yarn) yarn test || TEST_EXIT=$? ;;
              pnpm) pnpm test || TEST_EXIT=$? ;;
              npm)  npm test || TEST_EXIT=$? ;;
              uv)   uv run pytest || TEST_EXIT=$? ;;
              go)   go test ./... || TEST_EXIT=$? ;;
            esac
          fi

          # Collect lint
          if [ "$HAS_LINT" = "true" ]; then
            wait "$LINT_PID" || LINT_EXIT=$?
            echo "::group::Lint output"
            cat /tmp/lint.log 2>/dev/null || true
            echo "::endgroup::"
          fi

          # ── Wait for Docker publish ──
          if [ -n "$PUBLISH_PID" ]; then
            wait "$PUBLISH_PID" || PUBLISH_EXIT=$?
            echo "::group::Docker publish output"
            cat /tmp/publish.log 2>/dev/null || true
            echo "::endgroup::"
            if [ "$PUBLISH_EXIT" -ne 0 ]; then
              echo "::error::Docker publish failed (exit $PUBLISH_EXIT)"
            fi
          fi

          # ── Report results ──
          if [ "$LINT_EXIT" -ne 0 ]; then
            echo "::error::Lint failed (exit $LINT_EXIT)"
          fi
          if [ "$TEST_EXIT" -ne 0 ]; then
            echo "::error::Test failed (exit $TEST_EXIT)"
          fi

          # Fail if any phase failed
          [ "$LINT_EXIT" -eq 0 ] && [ "$TEST_EXIT" -eq 0 ] && [ "$PUBLISH_EXIT" -eq 0 ]

      # ── Post-publish: libraries, protos, notify (only on main, sequential) ──
      - uses: riven-private/github-actions/actions/publish-libraries@main
        if: inputs.publish == 'true' && steps.setup.outputs.has-libraries == 'true'

      - uses: riven-private/github-actions/actions/publish-protos@main
        if: inputs.publish == 'true'

      - name: Notify platform of build
        if: inputs.publish == 'true' && steps.setup.outputs.has-services == 'true'
        shell: bash
        continue-on-error: true
        run: |
          OWNER=$(echo "${{ inputs.target_repo }}" | cut -d'/' -f1)
          REPO=$(echo "${{ inputs.target_repo }}" | cut -d'/' -f2)
          SHA=$(git rev-parse --short HEAD)

          SERVICES="[]"
          if [ -f "detection.json" ]; then
            SERVICES=$(jq -c '[.services[].name]' detection.json 2>/dev/null || echo '[]')
          fi

          curl -s -X POST \
            "http://dev-center-service.dev-center.svc.cluster.local:8080/riven.repository.v1.RepositoryService/NotifyBuild" \
            -H "Content-Type: application/json" \
            -d "{\"githubOwner\":\"$OWNER\",\"githubRepo\":\"$REPO\",\"imageTag\":\"$SHA\",\"gitSha\":\"${{ github.sha }}\",\"branch\":\"${{ github.ref_name }}\",\"services\":$SERVICES}" \
            && echo "Build notification sent to Dev Center" \
            || echo "Failed to notify Dev Center (non-fatal)"

      - uses: riven-private/github-actions/actions/report-results@main
        if: always()
        with:
          devcenter-url: http://dev-center-service.dev-center.svc.cluster.local:8080
          repository-id: ${{ inputs.devcenter_repository_id }}
          check-run-id: ${{ inputs.check_run_id }}
          status: ${{ job.status }}

      # Reuse the target-token minted at the top of the job for the cross-repo
      # check-run update (removed the duplicate mint below).
      - name: Update check run
        if: always() && inputs.check_run_id != '' && steps.target-token.outputs.token != ''
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
        run: |
          set -euo pipefail
          TARGET="${{ inputs.target_repo }}"
          if [ -z "$TARGET" ] || ! echo "$TARGET" | grep -q '/'; then
            echo "No valid target_repo — skipping check run update"
            exit 0
          fi
          REPO_OWNER="${TARGET%%/*}"
          REPO_NAME="${TARGET##*/}"
          CONCLUSION="${{ job.status == 'success' && 'success' || 'failure' }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMPLETED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Build JSON payload via jq to escape reliably.
          PAYLOAD=$(jq -n \
            --arg status "completed" \
            --arg conclusion "$CONCLUSION" \
            --arg completed_at "$COMPLETED_AT" \
            --arg title "CI $CONCLUSION" \
            --arg summary "[View run](${RUN_URL})" \
            '{status: $status, conclusion: $conclusion, completed_at: $completed_at, output: {title: $title, summary: $summary}}')

          # curl instead of `gh` — self-hosted riven-runner lacks the gh CLI.
          HTTP_CODE=$(curl -sS -o /tmp/check.resp -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/check-runs/${{ inputs.check_run_id }}" \
            -d "$PAYLOAD")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to update check run (HTTP ${HTTP_CODE}):"
            cat /tmp/check.resp
            exit 1
          fi
          echo "Check run updated on ${TARGET}"

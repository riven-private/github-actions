name: "Setup Workspace"
description: "Detect workspace type, setup toolchain, configure caches, install dependencies"

inputs:
  codeartifact-domain:
    description: "CodeArtifact domain name (see shared/defaults.env)"
    default: "dev-center"
  codeartifact-domain-owner:
    description: "AWS account ID owning the CodeArtifact domain (see shared/defaults.env)"
    default: "572953113830"
  aws-region:
    description: "AWS region (see shared/defaults.env)"
    default: "us-east-1"
  node-version:
    description: "Node.js version override (auto-detected from .nvmrc/.node-version by nvm hook)"
    default: ""

outputs:
  workspace-type:
    description: "Detected workspace type: yarn, uv, npm, pnpm, go, or unknown"
    value: ${{ steps.detect.outputs.type }}
  node-version:
    description: "Resolved Node.js version"
    value: ${{ steps.detect.outputs.node_version }}
  has-services:
    description: "Whether the workspace has deployable services"
    value: ${{ steps.discover.outputs.has_services }}
  services:
    description: "JSON array of discovered services"
    value: ${{ steps.discover.outputs.services }}
  has-libraries:
    description: "Whether the workspace has publishable libraries"
    value: ${{ steps.discover.outputs.has_libraries }}
  libraries:
    description: "JSON array of discovered libraries"
    value: ${{ steps.discover.outputs.libraries }}

runs:
  using: "composite"
  steps:
    - name: Detect workspace type
      id: detect
      shell: bash
      run: |
        if [ -f "yarn.lock" ]; then
          TYPE="yarn"
        elif [ -f "uv.lock" ] || ([ -f "pyproject.toml" ] && grep -q '\[tool\.uv' pyproject.toml 2>/dev/null); then
          TYPE="uv"
        elif [ -f "go.mod" ]; then
          TYPE="go"
        elif [ -f "pnpm-lock.yaml" ]; then
          TYPE="pnpm"
        elif [ -f "package-lock.json" ]; then
          TYPE="npm"
        elif [ -f "package.json" ]; then
          TYPE="yarn"
        else
          TYPE="unknown"
        fi
        echo "type=$TYPE" >> $GITHUB_OUTPUT

        # Detect Node.js version (nvm auto-hook handles this on custom runner,
        # but we need it for actions/setup-node fallback on GitHub-hosted runners)
        NODE_VERSION="${{ inputs.node-version }}"
        if [ -z "$NODE_VERSION" ]; then
          if [ -f ".nvmrc" ]; then
            NODE_VERSION=$(cat .nvmrc | tr -d 'v \n')
          elif [ -f ".node-version" ]; then
            NODE_VERSION=$(cat .node-version | tr -d 'v \n')
          else
            NODE_VERSION="22"
          fi
        fi
        echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT
        echo "Detected: type=$TYPE, node=$NODE_VERSION"

    # ── Toolchain setup (skipped on custom runner image, needed on GitHub-hosted) ──
    - name: Setup Node.js
      if: steps.detect.outputs.type == 'yarn' || steps.detect.outputs.type == 'npm' || steps.detect.outputs.type == 'pnpm'
      shell: bash
      run: |
        if command -v node &> /dev/null; then
          echo "Node.js available: $(node --version)"
        else
          echo "::error::Node.js not found — use custom runner image or add actions/setup-node"
          exit 1
        fi

    - name: Enable Corepack
      if: steps.detect.outputs.type == 'yarn' || steps.detect.outputs.type == 'pnpm'
      shell: bash
      run: corepack enable 2>/dev/null || true

    # ── Caching ─────────────────────────────────────────────────────────────────
    - name: Cache yarn dependencies
      if: steps.detect.outputs.type == 'yarn'
      uses: actions/cache@v4
      with:
        path: |
          .yarn/cache
          .yarn/install-state.gz
          node_modules
        key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
        restore-keys: |
          yarn-${{ runner.os }}-

    - name: Cache UV dependencies
      if: steps.detect.outputs.type == 'uv'
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-

    - name: Cache Go modules
      if: steps.detect.outputs.type == 'go'
      uses: actions/cache@v4
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          go-${{ runner.os }}-

    - name: Cache buf modules
      uses: actions/cache@v4
      with:
        path: ~/.cache/buf
        key: buf-${{ runner.os }}-${{ hashFiles('**/buf.lock') }}
        restore-keys: |
          buf-${{ runner.os }}-

    # ── CodeArtifact auth ───────────────────────────────────────────────────────
    - name: CodeArtifact auth
      shell: bash
      run: |
        TOKEN=$(aws codeartifact get-authorization-token \
          --domain ${{ inputs.codeartifact-domain }} \
          --domain-owner ${{ inputs.codeartifact-domain-owner }} \
          --region ${{ inputs.aws-region }} \
          --query authorizationToken --output text 2>&1) || true
        if [ -n "$TOKEN" ] && [[ ! "$TOKEN" == *"error"* ]] && [[ ! "$TOKEN" == *"Unable"* ]]; then
          echo "CODEARTIFACT_AUTH_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "::add-mask::$TOKEN"
          echo "CodeArtifact authenticated"
        else
          echo "::warning::CodeArtifact auth failed — private @riven-* packages may not resolve"
        fi

    # ── Install riven-cli (global) ──────────────────────────────────────────────
    - name: Install riven-cli
      if: steps.detect.outputs.type == 'yarn' || steps.detect.outputs.type == 'npm' || steps.detect.outputs.type == 'pnpm'
      shell: bash
      run: |
        REGISTRY="https://dev-center-572953113830.d.codeartifact.us-east-1.amazonaws.com/npm/dev-center-npm/"
        if npm install -g @riven-private/riven-cli@latest --registry "$REGISTRY" 2>/dev/null; then
          echo "riven-cli $(riven -V 2>/dev/null || echo 'installed')"
        else
          echo "::warning::riven-cli global install failed — falling back to npx"
        fi

    # ── Install dependencies ────────────────────────────────────────────────────
    - name: Install dependencies
      shell: bash
      run: |
        case "${{ steps.detect.outputs.type }}" in
          yarn)  yarn install --immutable ;;
          npm)   npm ci ;;
          pnpm)  pnpm install --frozen-lockfile ;;
          uv)    uv sync --all-extras ;;
          go)    go mod download ;;
          *)     echo "Unknown workspace type — skipping install" ;;
        esac

    # ── Discover workspace members ──────────────────────────────────────────────
    - name: Discover workspace members
      id: discover
      shell: bash
      run: |
        SERVICES="[]"
        LIBRARIES="[]"

        case "${{ steps.detect.outputs.type }}" in
          yarn)
            SERVICES=$(yarn workspaces list --json 2>/dev/null | while read -r line; do
              LOC=$(echo "$line" | jq -r '.location')
              NAME=$(echo "$line" | jq -r '.name')
              PKG="$LOC/package.json"
              [ -f "$PKG" ] || continue
              IS_SERVICE=$(jq -r '.riven.service // false' "$PKG")
              if [ "$IS_SERVICE" = "true" ]; then
                ECR=$(jq -r '.riven.ecr // ""' "$PKG")
                VERSION=$(jq -r '.version // "0.0.0"' "$PKG")
                DF="$LOC/Dockerfile"
                [ -f "$DF" ] || DF="Dockerfile"
                echo "{\"name\":\"$NAME\",\"dir\":\"$LOC\",\"ecr\":\"$ECR\",\"version\":\"$VERSION\",\"dockerfile\":\"$DF\"}"
              fi
            done | jq -sc '.' 2>/dev/null || echo '[]')

            LIBRARIES=$(yarn workspaces list --json 2>/dev/null | while read -r line; do
              LOC=$(echo "$line" | jq -r '.location')
              NAME=$(echo "$line" | jq -r '.name')
              PKG="$LOC/package.json"
              [ -f "$PKG" ] || continue
              IS_SERVICE=$(jq -r '.riven.service // false' "$PKG")
              IS_PRIVATE=$(jq -r '.private // false' "$PKG")
              if [ "$IS_SERVICE" != "true" ] && [ "$IS_PRIVATE" != "true" ] && [ "$LOC" != "." ]; then
                VERSION=$(jq -r '.version // "0.0.0"' "$PKG")
                echo "{\"name\":\"$NAME\",\"dir\":\"$LOC\",\"version\":\"$VERSION\"}"
              fi
            done | jq -sc '.' 2>/dev/null || echo '[]')
            ;;
        esac

        [ "$SERVICES" = "null" ] && SERVICES="[]"
        [ "$LIBRARIES" = "null" ] && LIBRARIES="[]"

        echo "services=$SERVICES" >> $GITHUB_OUTPUT
        echo "libraries=$LIBRARIES" >> $GITHUB_OUTPUT

        SVC_COUNT=$(echo "$SERVICES" | jq 'length')
        LIB_COUNT=$(echo "$LIBRARIES" | jq 'length')
        HAS_SERVICES=$([ "$SVC_COUNT" -gt 0 ] && echo true || echo false)
        HAS_LIBRARIES=$([ "$LIB_COUNT" -gt 0 ] && echo true || echo false)

        echo "has_services=$HAS_SERVICES" >> $GITHUB_OUTPUT
        echo "has_libraries=$HAS_LIBRARIES" >> $GITHUB_OUTPUT

        # Write structured detection.json for downstream actions
        jq -n \
          --arg type "${{ steps.detect.outputs.type }}" \
          --arg node_version "${{ steps.detect.outputs.node_version }}" \
          --argjson services "$SERVICES" \
          --argjson libraries "$LIBRARIES" \
          --arg has_services "$HAS_SERVICES" \
          --arg has_libraries "$HAS_LIBRARIES" \
          '{
            workspace_type: $type,
            node_version: $node_version,
            services: $services,
            libraries: $libraries,
            has_services: ($has_services == "true"),
            has_libraries: ($has_libraries == "true")
          }' > detection.json
        echo "Discovered $SVC_COUNT services, $LIB_COUNT libraries (wrote detection.json)"

name: "Setup Workspace"
description: "Detect workspace type, setup toolchain, configure caches, install dependencies"

inputs:
  codeartifact-domain:
    description: "CodeArtifact domain name"
    default: "dev-center"
  codeartifact-domain-owner:
    description: "AWS account ID owning the CodeArtifact domain"
    default: "572953113830"
  aws-region:
    description: "AWS region"
    default: "us-east-1"
  node-version:
    description: "Node.js version override (auto-detected from .nvmrc/.node-version if not set)"
    default: ""

outputs:
  workspace-type:
    description: "Detected workspace type: yarn, uv, npm, pnpm, go, or unknown"
    value: ${{ steps.detect.outputs.type }}
  node-version:
    description: "Resolved Node.js version"
    value: ${{ steps.detect.outputs.node_version }}
  has-services:
    description: "Whether the workspace has deployable services"
    value: ${{ steps.discover.outputs.has_services }}
  services:
    description: "JSON array of discovered services"
    value: ${{ steps.discover.outputs.services }}
  has-libraries:
    description: "Whether the workspace has publishable libraries"
    value: ${{ steps.discover.outputs.has_libraries }}
  libraries:
    description: "JSON array of discovered libraries"
    value: ${{ steps.discover.outputs.libraries }}

runs:
  using: "composite"
  steps:
    - name: Detect workspace type and toolchain
      id: detect
      shell: bash
      run: |
        # Detect workspace type
        if [ -f "yarn.lock" ]; then
          TYPE="yarn"
        elif [ -f "uv.lock" ] || ([ -f "pyproject.toml" ] && grep -q '\[tool\.uv' pyproject.toml 2>/dev/null); then
          TYPE="uv"
        elif [ -f "go.mod" ]; then
          TYPE="go"
        elif [ -f "pnpm-lock.yaml" ]; then
          TYPE="pnpm"
        elif [ -f "package-lock.json" ]; then
          TYPE="npm"
        elif [ -f "package.json" ]; then
          TYPE="yarn"
        else
          TYPE="unknown"
        fi
        echo "type=$TYPE" >> $GITHUB_OUTPUT

        # Detect Node.js version
        NODE_VERSION="${{ inputs.node-version }}"
        if [ -z "$NODE_VERSION" ]; then
          if [ -f ".nvmrc" ]; then
            NODE_VERSION=$(cat .nvmrc | tr -d 'v \n')
          elif [ -f ".node-version" ]; then
            NODE_VERSION=$(cat .node-version | tr -d 'v \n')
          else
            NODE_VERSION="22"
          fi
        fi
        echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT

        echo "Detected: type=$TYPE, node=$NODE_VERSION"

    - name: Setup Node.js
      if: steps.detect.outputs.type == 'yarn' || steps.detect.outputs.type == 'npm' || steps.detect.outputs.type == 'pnpm'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ steps.detect.outputs.node_version }}

    - name: Enable Corepack
      if: steps.detect.outputs.type == 'yarn' || steps.detect.outputs.type == 'pnpm'
      shell: bash
      run: corepack enable

    - name: Setup Python + UV
      if: steps.detect.outputs.type == 'uv'
      shell: bash
      run: |
        if ! command -v uv &> /dev/null; then
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        fi
        uv --version

    - name: Install buf CLI (proto toolchain)
      shell: bash
      run: |
        if command -v buf &> /dev/null; then
          echo "buf already available: $(buf --version)"
          exit 0
        fi
        echo "Installing buf CLI..."
        BUF_VERSION="1.50.0"
        curl -sSL "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64" -o /tmp/buf
        chmod +x /tmp/buf
        sudo mv /tmp/buf /usr/local/bin/buf 2>/dev/null || mv /tmp/buf $HOME/.local/bin/buf
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        buf --version

    - name: Install build tools (native deps)
      shell: bash
      run: |
        if command -v make &> /dev/null; then exit 0; fi
        if command -v apt-get &> /dev/null; then
          sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3 2>/dev/null || true
        elif command -v apk &> /dev/null; then
          sudo apk add --no-cache build-base python3 2>/dev/null || true
        fi

    - name: Install AWS CLI (if missing)
      shell: bash
      run: |
        if command -v aws &> /dev/null; then
          echo "AWS CLI already available: $(aws --version)"
          exit 0
        fi
        echo "Installing AWS CLI..."
        curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscli.zip
        unzip -q /tmp/awscli.zip -d /tmp
        sudo /tmp/aws/install --update 2>/dev/null || /tmp/aws/install --update --install-dir $HOME/.local/aws --bin-dir $HOME/.local/bin 2>/dev/null
        rm -rf /tmp/awscli.zip /tmp/aws
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        aws --version

    - name: CodeArtifact auth
      shell: bash
      run: |
        TOKEN=$(aws codeartifact get-authorization-token \
          --domain ${{ inputs.codeartifact-domain }} \
          --domain-owner ${{ inputs.codeartifact-domain-owner }} \
          --region ${{ inputs.aws-region }} \
          --query authorizationToken --output text 2>&1) || true
        if [ -n "$TOKEN" ] && [[ ! "$TOKEN" == *"error"* ]] && [[ ! "$TOKEN" == *"Unable"* ]]; then
          echo "CODEARTIFACT_AUTH_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "::add-mask::$TOKEN"
          echo "CodeArtifact authenticated"
        else
          echo "::warning::CodeArtifact auth failed — private @riven-* packages may not resolve"
        fi

    - name: Install dependencies
      shell: bash
      run: |
        case "${{ steps.detect.outputs.type }}" in
          yarn)  yarn install --immutable ;;
          npm)   npm ci ;;
          pnpm)  pnpm install --frozen-lockfile ;;
          uv)    uv sync --all-extras ;;
          go)    go mod download ;;
          *)     echo "Unknown workspace type — skipping install" ;;
        esac

    - name: Discover workspace members
      id: discover
      shell: bash
      run: |
        SERVICES="[]"
        LIBRARIES="[]"

        case "${{ steps.detect.outputs.type }}" in
          yarn)
            SERVICES=$(yarn workspaces list --json 2>/dev/null | while read -r line; do
              LOC=$(echo "$line" | jq -r '.location')
              NAME=$(echo "$line" | jq -r '.name')
              PKG="$LOC/package.json"
              [ -f "$PKG" ] || continue
              IS_SERVICE=$(jq -r '.riven.service // false' "$PKG")
              if [ "$IS_SERVICE" = "true" ]; then
                ECR=$(jq -r '.riven.ecr // ""' "$PKG")
                VERSION=$(jq -r '.version // "0.0.0"' "$PKG")
                DF="$LOC/Dockerfile"
                [ -f "$DF" ] || DF="Dockerfile"
                echo "{\"name\":\"$NAME\",\"dir\":\"$LOC\",\"ecr\":\"$ECR\",\"version\":\"$VERSION\",\"dockerfile\":\"$DF\"}"
              fi
            done | jq -sc '.' 2>/dev/null || echo '[]')

            LIBRARIES=$(yarn workspaces list --json 2>/dev/null | while read -r line; do
              LOC=$(echo "$line" | jq -r '.location')
              NAME=$(echo "$line" | jq -r '.name')
              PKG="$LOC/package.json"
              [ -f "$PKG" ] || continue
              IS_SERVICE=$(jq -r '.riven.service // false' "$PKG")
              IS_PRIVATE=$(jq -r '.private // false' "$PKG")
              if [ "$IS_SERVICE" != "true" ] && [ "$IS_PRIVATE" != "true" ] && [ "$LOC" != "." ]; then
                VERSION=$(jq -r '.version // "0.0.0"' "$PKG")
                echo "{\"name\":\"$NAME\",\"dir\":\"$LOC\",\"version\":\"$VERSION\"}"
              fi
            done | jq -sc '.' 2>/dev/null || echo '[]')
            ;;
        esac

        [ "$SERVICES" = "null" ] && SERVICES="[]"
        [ "$LIBRARIES" = "null" ] && LIBRARIES="[]"

        echo "services=$SERVICES" >> $GITHUB_OUTPUT
        echo "libraries=$LIBRARIES" >> $GITHUB_OUTPUT

        SVC_COUNT=$(echo "$SERVICES" | jq 'length')
        LIB_COUNT=$(echo "$LIBRARIES" | jq 'length')
        echo "has_services=$([ "$SVC_COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        echo "has_libraries=$([ "$LIB_COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        echo "Discovered $SVC_COUNT services, $LIB_COUNT libraries"

name: "Build and Test"
description: "Build, lint, and test the workspace. Build includes codegen (proto, prisma) via each repo's build script."

inputs:
  build-only:
    description: "Only run build step, skip lint and test (used when ci-engine runs them in parallel with publish)"
    default: "false"

outputs:
  build-status:
    description: "Build result: success or failure"
    value: ${{ steps.build.outcome }}
  test-status:
    description: "Lint+Test result: success, failure, or skipped"
    value: ${{ steps.lint-and-test.outcome }}
  lint-status:
    description: "Lint+Test result (combined with test for parallel runs)"
    value: ${{ steps.lint-and-test.outcome }}

runs:
  using: "composite"
  steps:
    - name: Detect workspace type
      id: detect
      shell: bash
      run: |
        # Read from detection.json if setup-workspace already ran
        if [ -f "detection.json" ]; then
          TYPE=$(jq -r '.workspace_type' detection.json)
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "Read workspace type from detection.json: $TYPE"
        elif [ -f "yarn.lock" ]; then
          echo "type=yarn" >> $GITHUB_OUTPUT
        elif [ -f "pnpm-lock.yaml" ]; then
          echo "type=pnpm" >> $GITHUB_OUTPUT
        elif [ -f "package-lock.json" ]; then
          echo "type=npm" >> $GITHUB_OUTPUT
        elif [ -f "uv.lock" ] || [ -f "pyproject.toml" ]; then
          echo "type=uv" >> $GITHUB_OUTPUT
        elif [ -f "go.mod" ]; then
          echo "type=go" >> $GITHUB_OUTPUT
        else
          echo "type=unknown" >> $GITHUB_OUTPUT
        fi

    - name: Update buf dependencies
      shell: bash
      run: |
        # Run buf dep update for all buf.yaml files so buf generate can resolve
        # external deps (googleapis, protovalidate) on a fresh CI runner.
        # Copy shared proto files (com/riven/common/) from riven-cli into each
        # service's proto dir so buf dep update and buf generate can resolve imports.
        COMMON_PROTO_SRC=""
        if [ -d "node_modules/@riven-private/riven-cli/proto/com/riven/common" ]; then
          COMMON_PROTO_SRC="node_modules/@riven-private/riven-cli/proto/com/riven/common"
        else
          # Fallback: global riven-cli install
          GLOBAL_CLI_DIR=$(npm root -g 2>/dev/null)/@riven-private/riven-cli/proto/com/riven/common
          if [ -d "$GLOBAL_CLI_DIR" ]; then
            COMMON_PROTO_SRC="$GLOBAL_CLI_DIR"
          fi
        fi

        find . -name "buf.yaml" -not -path "*/node_modules/*" -not -path "*/.yarn/*" | while read -r bufyaml; do
          DIR=$(dirname "$bufyaml")
          # Find the proto module path from buf.yaml
          PROTO_PATH=$(grep -A1 "^modules:" "$bufyaml" 2>/dev/null | grep "path:" | head -1 | awk '{print $NF}')
          PROTO_DIR="$DIR/${PROTO_PATH:-.}"

          # Copy shared common proto if the service imports it
          if [ -n "$COMMON_PROTO_SRC" ] && [ -d "$PROTO_DIR" ]; then
            if grep -rq "com/riven/common/" "$PROTO_DIR" 2>/dev/null; then
              mkdir -p "$PROTO_DIR/com/riven/common"
              cp -n $COMMON_PROTO_SRC/*.proto "$PROTO_DIR/com/riven/common/" 2>/dev/null || true
            fi
          fi

          # Update buf deps (fetch BSR modules like googleapis, protovalidate)
          if grep -q "^deps:" "$bufyaml" 2>/dev/null; then
            echo "::group::buf dep update: $DIR"
            buf dep update "$DIR" 2>&1 || echo "buf dep update skipped for $DIR"
            echo "::endgroup::"
          fi
        done

    - name: Build
      id: build
      shell: bash
      env:
        NODE_OPTIONS: "--max-old-space-size=3072"
      run: |
        # Build includes codegen (proto generate, prisma generate, tsc, etc.)
        # Each repo's package.json "build" script handles its own codegen chain.
        case "${{ steps.detect.outputs.type }}" in
          yarn)  yarn build ;;
          pnpm)  pnpm build ;;
          npm)   npm run build ;;
          uv)    uv build 2>/dev/null || uv run python -m build 2>/dev/null || echo "No build configured" ;;
          go)    buf generate 2>/dev/null || true; go build ./... ;;
          *)     echo "Unknown workspace type — skipping build" ;;
        esac

    - name: Lint and Test (parallel)
      id: lint-and-test
      if: inputs.build-only != 'true'
      shell: bash
      env:
        NODE_OPTIONS: "--max-old-space-size=3072"
      run: |
        TYPE="${{ steps.detect.outputs.type }}"
        LINT_EXIT=0
        TEST_EXIT=0

        # Determine if lint/test scripts exist
        case "$TYPE" in
          yarn|npm|pnpm)
            HAS_LINT=$(node -e "const p=require('./package.json'); process.exit(p.scripts?.lint ? 0 : 1)" 2>/dev/null && echo "true" || echo "false")
            HAS_TEST=$(node -e "const p=require('./package.json'); process.exit(p.scripts?.test ? 0 : 1)" 2>/dev/null && echo "true" || echo "false")
            ;;
          uv)  HAS_LINT=true; HAS_TEST=true ;;
          go)  HAS_LINT=true; HAS_TEST=true ;;
          *)   HAS_LINT=false; HAS_TEST=false ;;
        esac

        # Run lint in background
        if [ "$HAS_LINT" = "true" ]; then
          (
            case "$TYPE" in
              yarn) yarn lint ;;
              pnpm) pnpm lint ;;
              npm)  npm run lint ;;
              uv)   uv run ruff check . 2>/dev/null; uv run ruff format --check . 2>/dev/null ;;
              go)   golangci-lint run ./... 2>/dev/null ;;
            esac
          ) > /tmp/lint.log 2>&1 &
          LINT_PID=$!
          echo "Lint started (PID $LINT_PID)"
        else
          echo "No lint script — skipping"
        fi

        # Run test in foreground
        if [ "$HAS_TEST" = "true" ]; then
          case "$TYPE" in
            yarn) yarn test || TEST_EXIT=$? ;;
            pnpm) pnpm test || TEST_EXIT=$? ;;
            npm)  npm test || TEST_EXIT=$? ;;
            uv)   uv run pytest || TEST_EXIT=$? ;;
            go)   go test ./... || TEST_EXIT=$? ;;
          esac
        else
          echo "No test script — skipping"
        fi

        # Collect lint result
        if [ "$HAS_LINT" = "true" ]; then
          wait "$LINT_PID" || LINT_EXIT=$?
          echo "::group::Lint output"
          cat /tmp/lint.log 2>/dev/null || true
          echo "::endgroup::"
          if [ "$LINT_EXIT" -ne 0 ]; then
            echo "::error::Lint failed (exit $LINT_EXIT)"
          fi
        fi

        if [ "$TEST_EXIT" -ne 0 ]; then
          echo "::error::Test failed (exit $TEST_EXIT)"
        fi

        # Fail if either failed
        [ "$LINT_EXIT" -eq 0 ] && [ "$TEST_EXIT" -eq 0 ]

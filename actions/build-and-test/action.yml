name: "Build and Test"
description: "Build, lint, and test the workspace. Build includes codegen (proto, prisma) via each repo's build script."

outputs:
  build-status:
    description: "Build result: success or failure"
    value: ${{ steps.build.outcome }}
  test-status:
    description: "Test result: success, failure, or skipped"
    value: ${{ steps.test.outcome }}
  lint-status:
    description: "Lint result: success, failure, or skipped"
    value: ${{ steps.lint.outcome }}

runs:
  using: "composite"
  steps:
    - name: Detect workspace type
      id: detect
      shell: bash
      run: |
        if [ -f "yarn.lock" ]; then
          echo "type=yarn" >> $GITHUB_OUTPUT
        elif [ -f "pnpm-lock.yaml" ]; then
          echo "type=pnpm" >> $GITHUB_OUTPUT
        elif [ -f "package-lock.json" ]; then
          echo "type=npm" >> $GITHUB_OUTPUT
        elif [ -f "uv.lock" ] || [ -f "pyproject.toml" ]; then
          echo "type=uv" >> $GITHUB_OUTPUT
        elif [ -f "go.mod" ]; then
          echo "type=go" >> $GITHUB_OUTPUT
        else
          echo "type=unknown" >> $GITHUB_OUTPUT
        fi

    - name: Update buf dependencies
      shell: bash
      run: |
        # Run buf dep update in all proto directories so buf generate can resolve
        # external deps (googleapis, protovalidate) on a fresh CI runner.
        find . -path "*/proto/buf.yaml" -not -path "*/node_modules/*" | while read -r bufyaml; do
          DIR=$(dirname "$bufyaml")
          echo "::group::buf dep update: $DIR"
          buf dep update "$DIR" 2>&1 || echo "buf dep update failed for $DIR (non-fatal)"
          echo "::endgroup::"
        done

    - name: Build
      id: build
      shell: bash
      env:
        NODE_OPTIONS: "--max-old-space-size=3072"
      run: |
        # Build includes codegen (proto generate, prisma generate, tsc, etc.)
        # Each repo's package.json "build" script handles its own codegen chain.
        case "${{ steps.detect.outputs.type }}" in
          yarn)  yarn build ;;
          pnpm)  pnpm build ;;
          npm)   npm run build ;;
          uv)    uv build 2>/dev/null || uv run python -m build 2>/dev/null || echo "No build configured" ;;
          go)    buf generate 2>/dev/null || true; go build ./... ;;
          *)     echo "Unknown workspace type — skipping build" ;;
        esac

    - name: Lint
      id: lint
      shell: bash
      run: |
        case "${{ steps.detect.outputs.type }}" in
          yarn|npm|pnpm)
            if node -e "const p=require('./package.json'); process.exit(p.scripts?.lint ? 0 : 1)" 2>/dev/null; then
              case "${{ steps.detect.outputs.type }}" in
                yarn) yarn lint ;;
                pnpm) pnpm lint ;;
                npm)  npm run lint ;;
              esac
            else
              echo "No lint script configured — skipping"
            fi
            ;;
          uv)
            uv run ruff check . 2>/dev/null || echo "ruff not available"
            uv run ruff format --check . 2>/dev/null || echo "ruff format not available"
            ;;
          go)
            golangci-lint run ./... 2>/dev/null || echo "golangci-lint not available"
            ;;
        esac

    - name: Test
      id: test
      shell: bash
      run: |
        case "${{ steps.detect.outputs.type }}" in
          yarn|npm|pnpm)
            if node -e "const p=require('./package.json'); process.exit(p.scripts?.test ? 0 : 1)" 2>/dev/null; then
              case "${{ steps.detect.outputs.type }}" in
                yarn) yarn test ;;
                pnpm) pnpm test ;;
                npm)  npm test ;;
              esac
            else
              echo "No test script configured — skipping"
            fi
            ;;
          uv)
            uv run pytest 2>/dev/null || echo "No tests configured"
            ;;
          go)
            go test ./...
            ;;
        esac
